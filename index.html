<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Görev Defterim</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  body {
    font-family: 'Inter', sans-serif;
    background: #EAF2FB;
    background-image:
      radial-gradient(circle at 10% 0%, rgba(147,197,253,0.35), transparent 45%),
      radial-gradient(circle at 100% 10%, rgba(191,219,254,0.4), transparent 40%),
      radial-gradient(circle at 50% 100%, rgba(219,234,254,0.5), transparent 50%);
    background-attachment: fixed;
  }
  .font-display { font-family: 'Baloo 2', sans-serif; font-weight: 700; }
</style>
</head>
<body class="min-h-screen">
<div id="root"></div>

<script>
/* ---------- FIREBASE SETUP ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyD21NukyZrv8jgDkf5FI1vO2FaFYspOc8I",
  authDomain: "disiplinprogram.firebaseapp.com",
  databaseURL: "https://disiplinprogram-default-rtdb.firebaseio.com",
  projectId: "disiplinprogram",
  storageBucket: "disiplinprogram.firebasestorage.app",
  messagingSenderId: "863365083229",
  appId: "1:863365083229:web:178ed938b682290ff99db4",
  measurementId: "G-50HZ0RPVV7"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function sanitizeKey(name) {
  // Firebase keys can't contain . # $ [ ] / — strip anything else out too, keep it simple
  return name.replace(/[.#$\[\]\/\s]/g, '').toLowerCase();
}

/* ---------- ICONS ---------- */
const ICON = {
  plus: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  x: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  trash: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>',
  calendar: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>',
  logout: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>',
  book: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>',
  lock: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
  user: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  chevDown: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
  chevUp: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>',
  edit: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>',
  check: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
};

/* ---------- STORAGE (Firebase Realtime Database — shared across every device) ---------- */
const store = {
  async getUsers() {
    const snap = await db.ref('users').once('value');
    return snap.val() || {};
  },
  async saveUser(username, password) {
    await db.ref('users/' + username).set(password);
  },
  getSession() { return localStorage.getItem('gd_session') || null; },
  setSession(name) { localStorage.setItem('gd_session', name || ''); },
  async getGroups(username) {
    const snap = await db.ref('tasks/' + username).once('value');
    const val = snap.val();
    return val ? Object.values(val) : [];
  },
  async saveGroups(username, groups) {
    await db.ref('tasks/' + username).set(groups);
  },
  async getNotes(username) {
    const snap = await db.ref('notes/' + username).once('value');
    return snap.val() || {};
  },
  async saveNotes(username, notes) {
    await db.ref('notes/' + username).set(notes);
  },
};

/* ---------- HELPERS ---------- */
const PALETTE = [
  { bg: 'bg-indigo-100', text: 'text-indigo-700', border: 'border-l-indigo-400', bar: 'bg-indigo-500' },
  { bg: 'bg-teal-100', text: 'text-teal-700', border: 'border-l-teal-400', bar: 'bg-teal-500' },
  { bg: 'bg-amber-100', text: 'text-amber-700', border: 'border-l-amber-400', bar: 'bg-amber-500' },
  { bg: 'bg-rose-100', text: 'text-rose-700', border: 'border-l-rose-400', bar: 'bg-rose-500' },
  { bg: 'bg-violet-100', text: 'text-violet-700', border: 'border-l-violet-400', bar: 'bg-violet-500' },
  { bg: 'bg-cyan-100', text: 'text-cyan-700', border: 'border-l-cyan-400', bar: 'bg-cyan-500' },
];
function colorFor(title) {
  let hash = 0;
  for (let i = 0; i < title.length; i++) hash = (hash * 31 + title.charCodeAt(i)) >>> 0;
  return PALETTE[hash % PALETTE.length];
}
function todayISO() {
  const d = new Date();
  const off = d.getTimezoneOffset();
  return new Date(d.getTime() - off * 60000).toISOString().slice(0, 10);
}
function formatDate(iso) {
  try {
    const d = new Date(iso + 'T00:00:00');
    return new Intl.DateTimeFormat('tr-TR', { weekday: 'long', day: 'numeric', month: 'long' }).format(d);
  } catch { return iso; }
}
function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ---------- STATE ---------- */
let state = {
  booting: true,
  currentUser: null,
  groups: [],
  authMode: 'login',
  authError: '',
  authLoading: false,
  modalOpen: false,
  formDate: todayISO(),
  formTitle: '',
  formTasks: [{ id: uid(), text: '' }],
  formError: '',
  collapsed: {},
  syncError: '',
  editingTask: null,
  notes: {},
  view: 'app',
  noteDate: todayISO(),
  noteText: '',
};

function setState(patch) { Object.assign(state, patch); render(); }

(async function boot() {
  const session = store.getSession();
  if (session) {
    try {
      state.currentUser = session;
      state.groups = await store.getGroups(session);
      state.notes = await store.getNotes(session);
    } catch {
      state.currentUser = null;
    }
  }
  state.booting = false;
  render();
})();

/* ---------- ACTIONS ---------- */
async function handleAuth(e) {
  e.preventDefault();
  const rawName = document.getElementById('authName').value.trim();
  const pass = document.getElementById('authPass').value;
  const name = sanitizeKey(rawName);
  if (!name || !pass) return setState({ authError: 'Kullanıcı adı ve şifre gerekli.' });

  setState({ authLoading: true, authError: '' });
  try {
    const users = await store.getUsers();
      if (state.authMode === 'register') {
        if (users[name]) { setState({ authLoading: false, authError: 'Bu kullanıcı adı zaten alınmış.' }); return; }
        await store.saveUser(name, pass);
        store.setSession(name);
        setState({ currentUser: name, groups: [], notes: {}, authError: '', authLoading: false });
      } else {
        if (!users[name] || users[name] !== pass) { setState({ authLoading: false, authError: 'Kullanıcı adı veya şifre hatalı.' }); return; }
        store.setSession(name);
        const groups = await store.getGroups(name);
        const notes = await store.getNotes(name);
        setState({ currentUser: name, groups, notes, authError: '', authLoading: false });
      }
  } catch (err) {
    setState({ authLoading: false, authError: 'Bağlantı sorunu oluştu, tekrar dene.' });
  }
}
function handleLogout() {
  store.setSession('');
  setState({ currentUser: null, groups: [] });
}
function openModal() {
  setState({ modalOpen: true, formDate: todayISO(), formTitle: '', formTasks: [{ id: uid(), text: '' }], formError: '' });
}
function closeModal() { setState({ modalOpen: false }); }
function addTaskRow() { state.formTasks.push({ id: uid(), text: '' }); render(); }
function removeTaskRow(id) {
  if (state.formTasks.length > 1) { state.formTasks = state.formTasks.filter(t => t.id !== id); render(); }
}
async function saveGroup() {
  const title = document.getElementById('formTitle').value.trim();
  const tasks = state.formTasks.filter(t => t.text.trim());
  if (!title) return setState({ formError: 'Lütfen bir başlık gir.' });
  if (tasks.length === 0) return setState({ formError: 'En az bir görev girmelisin.' });
  const newGroup = {
    id: uid(), date: document.getElementById('formDate').value || todayISO(), title, createdAt: Date.now(),
    tasks: tasks.map(t => ({ id: uid(), text: t.text.trim(), done: false })),
  };
  const next = [newGroup, ...state.groups];
  try {
    await store.saveGroups(state.currentUser, next);
    setState({ groups: next, modalOpen: false, syncError: '' });
  } catch {
    setState({ formError: 'Kaydedilemedi, internet bağlantını kontrol edip tekrar dene.' });
  }
}
async function toggleTask(groupId, taskId) {
  const next = state.groups.map(g => g.id === groupId
    ? { ...g, tasks: g.tasks.map(t => t.id === taskId ? { ...t, done: !t.done } : t) } : g);
  setState({ groups: next });
  try {
    await store.saveGroups(state.currentUser, next);
  } catch {
    setState({ syncError: 'Değişiklik kaydedilemedi, internet bağlantını kontrol et.' });
  }
}
async function deleteGroup(groupId) {
  const next = state.groups.filter(g => g.id !== groupId);
  setState({ groups: next });
  try {
    await store.saveGroups(state.currentUser, next);
  } catch {
    setState({ syncError: 'Silme işlemi kaydedilemedi, internet bağlantını kontrol et.' });
  }
}
async function deleteTask(groupId, taskId) {
  const next = state.groups.map(g => g.id === groupId ? { ...g, tasks: g.tasks.filter(t => t.id !== taskId) } : g);
  setState({ groups: next });
  try {
    await store.saveGroups(state.currentUser, next);
  } catch {
    setState({ syncError: 'Silme işlemi kaydedilemedi, internet bağlantını kontrol et.' });
  }
}
function toggleCollapse(groupId) { state.collapsed[groupId] = !state.collapsed[groupId]; render(); }
function startEditTask(groupId, taskId) {
  state.collapsed[groupId] = false;
  setState({ editingTask: { groupId, taskId } });
}
function cancelEditTask() { setState({ editingTask: null }); }
async function saveEditTask(groupId, taskId) {
  const input = document.getElementById('editTaskInput');
  const text = input ? input.value.trim() : '';
  if (!text) { cancelEditTask(); return; }
  const next = state.groups.map(g => g.id === groupId
    ? { ...g, tasks: g.tasks.map(t => t.id === taskId ? { ...t, text } : t) } : g);
  setState({ groups: next, editingTask: null });
  try {
    await store.saveGroups(state.currentUser, next);
  } catch {
    setState({ syncError: 'Değişiklik kaydedilemedi, internet bağlantını kontrol et.' });
  }
}

/* ---------- NOTE ACTIONS ---------- */
function goToNotes() {
  setState({ view: 'notes', noteDate: todayISO(), noteText: state.notes[todayISO()] || '' });
}
function goToApp() { setState({ view: 'app' }); }
function loadNoteForDate() {
  state.noteText = state.notes[state.noteDate] || '';
  const ta = document.getElementById('noteTextArea');
  if (ta) ta.value = state.noteText;
}
function loadNoteDate(date) {
  setState({ noteDate: date, noteText: state.notes[date] || '' });
}
async function deleteNote(date) {
  const next = { ...state.notes };
  delete next[date];
  setState({ notes: next });
  try {
    await store.saveNotes(state.currentUser, next);
  } catch {
    setState({ syncError: 'Not silinemedi, internet bağlantını kontrol et.' });
  }
}
async function saveNote() {
  const date = state.noteDate;
  const text = state.noteText.trim();
  const next = { ...state.notes, [date]: text };
  setState({ notes: next });
  try {
    await store.saveNotes(state.currentUser, next);
  } catch {
    setState({ syncError: 'Not kaydedilemedi, internet bağlantını kontrol et.' });
  }
}

/* ---------- RENDER ---------- */
function renderBooting() {
  return `<div class="min-h-screen flex items-center justify-center text-slate-400 text-sm">Yükleniyor...</div>`;
}

function renderAuth() {
  return `
  <div class="min-h-screen flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
      <div class="flex items-center justify-center gap-2 mb-8">
        <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white">${ICON.book}</div>
        <span class="text-2xl text-slate-800 font-display">Görev Defterim</span>
      </div>
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-6">
        <div class="flex mb-6 bg-slate-100 rounded-xl p-1">
          <button onclick="setState({authMode:'login', authError:''})" class="flex-1 py-2 rounded-lg text-sm font-medium transition ${state.authMode === 'login' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}">Giriş Yap</button>
          <button onclick="setState({authMode:'register', authError:''})" class="flex-1 py-2 rounded-lg text-sm font-medium transition ${state.authMode === 'register' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}">Kayıt Ol</button>
        </div>
        <form onsubmit="handleAuth(event)" class="space-y-4">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Kullanıcı Adı</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">${ICON.user}</span>
              <input id="authName" placeholder="örn: reyyan123" class="w-full pl-9 pr-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
            </div>
          </div>
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Şifre</label>
            <div class="relative">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">${ICON.lock}</span>
              <input id="authPass" type="password" placeholder="••••••••" class="w-full pl-9 pr-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
            </div>
          </div>
          ${state.authError ? `<p class="text-sm text-rose-600">${esc(state.authError)}</p>` : ''}
          <button type="submit" ${state.authLoading ? 'disabled' : ''} class="w-full bg-blue-600 hover:bg-blue-700 disabled:opacity-60 text-white font-semibold py-2.5 rounded-xl transition">
            ${state.authLoading ? 'Kontrol ediliyor...' : (state.authMode === 'login' ? 'Giriş Yap' : 'Hesap Oluştur')}
          </button>
        </form>
      </div>
      <p class="text-center text-xs text-slate-400 mt-4">Bu hesap artık her cihazdan erişilebilir; aynı kullanıcı adı/şifre ile istediğin telefon veya bilgisayardan giriş yapabilirsin.</p>
    </div>
  </div>`;
}

function renderApp() {
  const today = todayISO();
  const totalToday = state.groups.filter(g => g.date === today).reduce((s, g) => s + g.tasks.length, 0);
  const doneToday = state.groups.filter(g => g.date === today).reduce((s, g) => s + g.tasks.filter(t => t.done).length, 0);
  const sorted = [...state.groups].filter(g => g.date !== today).sort((a, b) => (a.date > b.date ? 1 : a.date < b.date ? -1 : a.createdAt - b.createdAt));

  const dateOrder = [];
  const byDate = {};
  sorted.forEach(g => {
    if (!byDate[g.date]) { byDate[g.date] = []; dateOrder.push(g.date); }
    byDate[g.date].push(g);
  });

  function renderGroupCard(g) {
    const color = colorFor(g.title);
    const doneCount = g.tasks.filter(t => t.done).length;
    const isCollapsed = state.collapsed[g.id];
    const pct = g.tasks.length ? (doneCount / g.tasks.length) * 100 : 0;
    const taskRows = g.tasks.map(t => {
      const isEditing = state.editingTask && state.editingTask.groupId === g.id && state.editingTask.taskId === t.id;
      if (isEditing) {
        return `
        <div class="flex items-center gap-2 bg-blue-50 rounded-xl px-3 py-2">
          <input id="editTaskInput" autofocus value="${esc(t.text)}" class="flex-1 text-sm bg-white border border-blue-300 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-400" onkeydown="if(event.key==='Enter') saveEditTask('${g.id}','${t.id}'); if(event.key==='Escape') cancelEditTask();" />
          <button onclick="saveEditTask('${g.id}','${t.id}')" class="text-emerald-600 hover:text-emerald-700 shrink-0" title="Kaydet">${ICON.check}</button>
          <button onclick="cancelEditTask()" class="text-slate-400 hover:text-rose-600 shrink-0" title="Vazgeç">${ICON.x}</button>
        </div>`;
      }
      return `
      <div class="flex items-center gap-3 bg-slate-50 hover:bg-slate-100 rounded-xl px-3 py-2 group">
        <button onclick="toggleTask('${g.id}','${t.id}')" class="w-5 h-5 rounded-full border-2 flex items-center justify-center shrink-0 transition ${t.done ? 'bg-emerald-500 border-emerald-500' : 'border-slate-300'}">
          ${t.done ? '<span class="text-white text-xs">✓</span>' : ''}
        </button>
        <span class="text-sm flex-1 ${t.done ? 'line-through text-slate-400' : 'text-slate-700'}">${esc(t.text)}</span>
        <button onclick="startEditTask('${g.id}','${t.id}')" class="text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 rounded-lg p-1.5 transition shrink-0" title="Düzenle">${ICON.edit}</button>
        <button onclick="deleteTask('${g.id}','${t.id}')" class="text-rose-400 hover:text-rose-600 bg-rose-50 hover:bg-rose-100 rounded-lg p-1.5 transition shrink-0" title="Sil">${ICON.x}</button>
      </div>`;
    }).join('');
    return `
    <div class="bg-white rounded-2xl border border-slate-200 border-l-4 ${color.border} overflow-hidden">
      <div class="p-4 flex items-start justify-between gap-3">
        <div class="flex-1 min-w-0">
          <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${color.bg} ${color.text}">${esc(g.title)}</span>
          <div class="w-full bg-slate-100 rounded-full h-1.5 mt-2"><div class="h-1.5 rounded-full ${color.bar}" style="width:${pct}%"></div></div>
          <p class="text-xs text-slate-400 mt-1">${doneCount} / ${g.tasks.length} tamamlandı</p>
        </div>
        <div class="flex items-center gap-1 shrink-0">
          <button onclick="toggleCollapse('${g.id}')" class="text-slate-400 hover:text-slate-600 p-1.5 rounded-lg hover:bg-slate-100">${isCollapsed ? ICON.chevDown : ICON.chevUp}</button>
          <button onclick="deleteGroup('${g.id}')" class="text-slate-400 hover:text-rose-600 p-1.5 rounded-lg hover:bg-rose-50">${ICON.trash}</button>
        </div>
      </div>
      ${isCollapsed ? '' : `<div class="px-4 pb-4 space-y-1.5">${taskRows}</div>`}
    </div>`;
  }

  const groupsHtml = dateOrder.length === 0 ? `
    <div class="text-center py-16 text-slate-400">
      <div class="mx-auto mb-3 text-slate-300 w-8 h-8 flex items-center justify-center">${ICON.book}</div>
      <p class="font-medium text-slate-500">Henüz görev grubu yok</p>
      <p class="text-sm mt-1">Başlamak için "Görev Grubu Ekle" butonuna tıkla.</p>
    </div>` : dateOrder.map(date => `
      <div class="mb-6">
        <div class="flex items-center gap-2 mb-2 px-1">
          ${ICON.calendar}
          <h3 class="text-sm font-semibold text-slate-600">${formatDate(date)}</h3>
        </div>
        <div class="space-y-3">${byDate[date].map(renderGroupCard).join('')}</div>
      </div>`).join('');

  const modalHtml = !state.modalOpen ? '' : `
    <div class="fixed inset-0 bg-slate-900/40 flex items-center justify-center p-4 z-50" onclick="if(event.target===this) closeModal()">
      <div class="bg-white rounded-2xl w-full max-w-md p-6">
        <div class="flex items-center justify-between mb-5">
          <h2 class="text-xl font-bold text-slate-800">Görev Grubu Ekle</h2>
          <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">${ICON.x}</button>
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Tarih</label>
          <input id="formDate" type="date" value="${state.formDate}" oninput="state.formDate=this.value" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Başlık</label>
          <input id="formTitle" placeholder="örn: Proje raporu" value="${esc(state.formTitle)}" oninput="state.formTitle=this.value" class="w-full px-3 py-2.5 rounded-xl border border-blue-400 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Görevler</label>
          <div class="space-y-2">
            ${state.formTasks.map((t, idx) => `
            <div class="flex items-center gap-2 border border-slate-200 rounded-xl p-1.5 pl-1.5">
              <span class="w-7 h-7 rounded-full bg-blue-600 text-white text-xs font-semibold flex items-center justify-center shrink-0">${idx + 1}</span>
              <input class="task-row-input flex-1 text-sm focus:outline-none min-w-0" placeholder="Ne yapılacak?" value="${esc(t.text)}" oninput="state.formTasks[${idx}].text=this.value" />
              ${state.formTasks.length > 1 ? `<button onclick="removeTaskRow('${t.id}')" class="text-slate-300 hover:text-rose-600 shrink-0 mr-1">${ICON.x}</button>` : ''}
            </div>`).join('')}
          </div>
          <button onclick="addTaskRow()" class="w-full mt-2 border border-dashed border-slate-300 rounded-xl py-2 text-sm text-slate-500 hover:bg-slate-50 hover:border-slate-400 transition flex items-center justify-center gap-1.5">${ICON.plus} Görev Ekle</button>
        </div>
        ${state.formError ? `<p class="text-sm text-rose-600 mb-3">${esc(state.formError)}</p>` : ''}
        <button onclick="saveGroup()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">Kaydet</button>
      </div>
    </div>`;

  return `
  <div class="min-h-screen">
    <header class="bg-white border-b border-slate-200">
      <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center text-white">${ICON.book}</div>
          <span class="text-xl text-slate-800 font-display">Görev Defterim</span>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-sm text-slate-500 hidden sm:inline">Merhaba, <span class="font-semibold text-slate-700">${esc(state.currentUser)}</span></span>
          <button onclick="handleLogout()" class="flex items-center gap-1.5 text-sm text-slate-500 hover:text-rose-600 transition px-2 py-1.5 rounded-lg hover:bg-rose-50">${ICON.logout} Çıkış</button>
        </div>
      </div>
    </header>
    <main class="max-w-2xl mx-auto px-4 py-6">
      ${state.syncError ? `<div class="bg-amber-50 border border-amber-200 text-amber-800 text-sm rounded-xl px-4 py-3 mb-4">${esc(state.syncError)}</div>` : ''}
      <div class="flex justify-end gap-2 mb-4">
        <button onclick="goToNotes()" class="flex items-center gap-1.5 text-sm font-semibold text-blue-600 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-4 py-2.5 rounded-xl transition shrink-0">${ICON.edit} Notlar</button>
        <button onclick="openModal()" class="flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold px-4 py-2.5 rounded-xl transition shrink-0">${ICON.plus} Görev Grubu Ekle</button>
      </div>
      <div class="bg-white rounded-2xl border border-slate-200 p-5 mb-6">
        <p class="text-sm text-slate-500">Bugün</p>
        <p class="text-lg font-semibold text-slate-800">${formatDate(today)}</p>
        ${totalToday > 0 ? `<p class="text-sm text-slate-500 mt-1">${doneToday} / ${totalToday} görev tamamlandı</p>` : `<p class="text-sm text-slate-400 mt-1">Bugün için görev yok</p>`}
        ${(() => {
          const todayGroups = state.groups.filter(g => g.date === today);
          if (todayGroups.length === 0) return '';
          return todayGroups.map(g => `
            <div class="mt-3 pt-3 border-t border-slate-100">
              <span class="text-xs font-semibold px-2 py-0.5 rounded-full ${colorFor(g.title).bg} ${colorFor(g.title).text}">${esc(g.title)}</span>
              <div class="mt-1.5 space-y-1">
                ${g.tasks.map(t => `
                  <div class="flex items-center gap-2 text-sm">
                    <button onclick="toggleTask('${g.id}','${t.id}')" class="w-4 h-4 rounded-full border-2 flex items-center justify-center shrink-0 transition ${t.done ? 'bg-emerald-500 border-emerald-500' : 'border-slate-300'}">
                      ${t.done ? '<span class="text-white text-xs">✓</span>' : ''}
                    </button>
                    <span class="text-sm ${t.done ? 'line-through text-slate-400' : 'text-slate-600'}">${esc(t.text)}</span>
                  </div>`).join('')}
              </div>
            </div>`).join('');
        })()}
      </div>
      <div class="space-y-4">${groupsHtml}</div>
    </main>
    ${modalHtml}
  </div>`;
}

function renderNotes() {
  const dates = Object.keys(state.notes).sort();
  return `
  <div class="min-h-screen">
    <header class="bg-white border-b border-slate-200">
      <div class="max-w-2xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="w-9 h-9 rounded-xl bg-blue-600 flex items-center justify-center text-white">${ICON.book}</div>
          <span class="text-xl text-slate-800 font-display">Notlar</span>
        </div>
        <button onclick="goToApp()" class="flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-700 transition px-2 py-1.5 rounded-lg hover:bg-slate-100">${ICON.x} Geri</button>
      </div>
    </header>
    <main class="max-w-2xl mx-auto px-4 py-6">
      <div class="bg-white rounded-2xl border border-slate-200 p-5 mb-6">
        <div class="mb-4">
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Tarih</label>
          <input id="noteDate" type="date" value="${state.noteDate}" oninput="state.noteDate=this.value; loadNoteForDate()" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
        </div>
        <div class="mb-4">
          <label class="block text-sm font-semibold text-slate-700 mb-1.5">Not</label>
          <textarea id="noteTextArea" rows="8" placeholder="Bu tarih için notların..." oninput="state.noteText=this.value" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent resize-none">${esc(state.noteText)}</textarea>
        </div>
        <button onclick="saveNote()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition">Notu Kaydet</button>
        ${state.syncError ? `<p class="text-sm text-rose-600 mt-3">${esc(state.syncError)}</p>` : ''}
      </div>
      ${dates.length > 0 ? `
      <div class="bg-white rounded-2xl border border-slate-200 p-5">
        <h3 class="text-sm font-semibold text-slate-700 mb-3">Kayıtlı Notlar</h3>
        <div class="space-y-3">
          ${dates.map(d => `
            <div class="border border-slate-100 rounded-xl p-3">
              <div class="flex items-center justify-between mb-1">
                <span class="text-xs font-semibold text-slate-500">${formatDate(d)}</span>
                <div class="flex items-center gap-2">
                  <button onclick="loadNoteDate('${d}')" class="text-xs text-blue-600 hover:text-blue-700">Düzenle</button>
                  <button onclick="if(confirm('Bu notu silmek istediğine emin misin?')) deleteNote('${d}')" class="text-xs text-rose-500 hover:text-rose-700">${ICON.trash}</button>
                </div>
              </div>
              <p class="text-sm text-slate-600 whitespace-pre-wrap">${esc(state.notes[d])}</p>
            </div>
          `).join('')}
        </div>
      </div>` : ''}
    </main>
  </div>`;
}

function render() {
  const root = document.getElementById('root');
  if (state.booting) root.innerHTML = renderBooting();
  else if (!state.currentUser) root.innerHTML = renderAuth();
  else if (state.view === 'notes') root.innerHTML = renderNotes();
  else root.innerHTML = renderApp();
}
render();
</script>
</body>
</html>
